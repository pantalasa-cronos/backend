apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: backend-gateway
  namespace: istio-system
spec:
  selector: {istio: ingressgateway}
  servers:
    - port: {number: 443, name: https, protocol: HTTPS}
      hosts: ["backend.example.com"]
      tls: {mode: SIMPLE, credentialName: backend-cert}
    - port: {number: 80, name: http, protocol: HTTP}
      hosts: ["backend.example.com"]
      tls: {httpsRedirect: true}
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata: {name: backend, namespace: engineering}
spec:
  hosts: ["backend.example.com"]
  gateways: ["istio-system/backend-gateway"]
  http:
    - route: [{destination: {host: backend, port: {number: 8080}}}]
      timeout: 10s
      retries: {attempts: 3, perTryTimeout: 2s}
---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata: {name: backend, namespace: engineering}
spec:
  host: backend
  trafficPolicy:
    tls: {mode: ISTIO_MUTUAL}
    outlierDetection: {consecutive5xxErrors: 5, interval: 30s}
    connectionPool: {tcp: {maxConnections: 100}}
