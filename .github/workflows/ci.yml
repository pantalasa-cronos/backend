name: GH-Actions
on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
    branches:
      - "**"
env:
  CARGO_TERM_COLOR: always

jobs:
  go_service_build:
    runs-on: cronos
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: true
      - name: Other depedencies
        run: |
          apt-get install -y gpg
      - name: Go Service Build
        run: |
          cat Dockerfile
          go mod download
          go build -o go-server
          ls
      - name: Go Service Test
        run: go test ./... -coverprofile /tmp/coverage.out
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: "/tmp/coverage.out"
      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push Docker image
        run: |
          IMAGE="pantalasabot/pantalasa"
          SHA_TAG="cronos-backend-${{ github.sha }}"
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          docker build \
            --label git_sha=${{ github.sha }} \
            --label build_date=${BUILD_DATE} \
            --label version=${{ github.ref_name }} \
            --label repository=${IMAGE} \
            -t ${IMAGE}:${SHA_TAG} \
            .

          if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.ref }}" == refs/tags/v* ]]; then
            docker push ${IMAGE}:${SHA_TAG}
            echo "Pushed ${IMAGE}:${SHA_TAG}"
          fi

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION_TAG="cronos-backend-${VERSION#v}"
            docker tag ${IMAGE}:${SHA_TAG} ${IMAGE}:${VERSION_TAG}
            docker push ${IMAGE}:${VERSION_TAG}
            echo "Pushed ${IMAGE}:${VERSION_TAG}"
          fi

  sbom:
    runs-on: cronos
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
      - name: Generate SBOM
        run: |
          syft dir:. -o cyclonedx-json=sbom.cyclonedx.json
          echo "SBOM generated:"
          cat sbom.cyclonedx.json | head -50

  semgrep:
    runs-on: cronos
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Semgrep
        run: |
          pip3 install --break-system-packages semgrep
      - name: Run Semgrep scan
        run: |
          semgrep scan --config auto --json --output semgrep-results.json || true
          cat semgrep-results.json | head -100

  gitleaks:
    runs-on: cronos
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar xz -C /usr/local/bin gitleaks
      - name: Run Gitleaks scan
        run: |
          gitleaks detect --source . --report-path gitleaks-report.json --report-format json --no-git || true
          echo "Gitleaks report:"
          cat gitleaks-report.json 2>/dev/null || echo "No report generated"

  kubectl:
    runs-on: cronos
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install kubectl
        run: |
          curl -fsSL "https://dl.k8s.io/release/v1.29.2/bin/linux/amd64/kubectl" -o /usr/local/bin/kubectl
          chmod +x /usr/local/bin/kubectl
          kubectl version --client
      - name: Run kubectl commands (ENG-530 cicd hook test)
        run: |
          mkdir -p /tmp/k8stest
          cd /tmp/k8stest
          cat > deployment.yaml << 'YAML'
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: demo-app
            namespace: default
          spec:
            replicas: 3
            selector:
              matchLabels:
                app: demo
            template:
              metadata:
                labels:
                  app: demo
              spec:
                containers:
                - name: app
                  image: nginx:1.25
          YAML
          kubectl version --client
          kubectl version --client -o yaml
          kubectl create --dry-run=client -f deployment.yaml -o yaml
          kubectl config view
