name: kubectl-min-version-test
on:
  push:
    branches:
      - "**"

jobs:
  kubectl_struct_format:
    runs-on: cronos
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install kubectl 1.27 (struct version format — pre-1.28)
        run: |
          curl -LO "https://dl.k8s.io/release/v1.27.16/bin/linux/amd64/kubectl"
          chmod +x kubectl
          mv kubectl /usr/local/bin/kubectl
          kubectl version --client
      - name: Run kubectl (triggers ci-after-command collector)
        run: kubectl version --client
